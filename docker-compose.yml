services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      - mongo
      - redis
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/debales-webhook}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      API_PORT: ${API_PORT:-3000}
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
    ports:
      - "3001:3000"

  echo-server:
    build:
      context: .
      dockerfile: docker/echo-server/Dockerfile
    ports:
      - "8888:8888"

volumes:
  mongo-data:
  redis-data:
